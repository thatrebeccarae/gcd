<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Content Done — Install Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 48px 20px;
  }

  .terminal {
    width: 680px;
    background: #1a1b2e;
    border-radius: 12px;
    box-shadow:
      0 24px 80px rgba(0, 0, 0, 0.6),
      0 0 0 1px rgba(255, 255, 255, 0.06);
    overflow: hidden;
  }

  .title-bar {
    background: #252638;
    height: 40px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    position: relative;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  }

  .dots { display: flex; gap: 8px; }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }

  .dot.red    { background: #ff5f57; }
  .dot.yellow { background: #febc2e; }
  .dot.green  { background: #28c840; }

  .title-text {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: #6b6b85;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    font-size: 13px;
    font-weight: 500;
  }

  .content {
    padding: 22px 26px 28px;
    font-family: "SF Mono", "Menlo", "Monaco", "Cascadia Code", "Consolas", monospace;
    font-size: 13.5px;
    line-height: 1.7;
  }

  .line { white-space: pre; }

  .prompt  { color: #b48ead; }
  .command { color: #f0f0f0; font-weight: 600; }
  .muted   { color: #555570; }
  .dim     { color: #6b7280; }
  .light   { color: #c0c8d8; }
  .green   { color: #5de4c7; }

  .spacer    { height: 12px; }
  .spacer-sm { height: 6px; }

  .cursor {
    display: inline-block;
    background: #f0f0f0;
    width: 8px;
    height: 16px;
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0; }
  }
</style>
</head>
<body>

<div class="terminal">
  <div class="title-bar">
    <div class="dots">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
    </div>
    <span class="title-text">Terminal</span>
  </div>

  <div class="content">

    <div class="line"><span class="prompt">~ $</span> <span class="command">git clone https://github.com/thatrebeccarae/get-content-done.git</span></div>
    <div class="line"><span class="dim">Cloning into 'get-content-done'...</span></div>
    <div class="spacer-sm"></div>

    <div class="line"><span class="prompt">~ $</span> <span class="command">cp -r get-content-done/skills/* ~/.claude/skills/</span></div>
    <div class="line"><span class="prompt">~ $</span> <span class="command">cp -r get-content-done/agents/* ~/.claude/agents/</span></div>
    <div class="spacer"></div>

    <div class="line"><span class="prompt">~ $</span> <span class="command">claude</span></div>
    <div class="line"><span class="muted">&gt;</span> <span class="command">/gcd:plan-sprint</span></div>
    <div class="spacer-sm"></div>
    <div class="line"><span class="green">&#10003;</span> <span class="light">10 skills loaded</span>  <span class="muted">|</span>  <span class="light">7 agents ready</span></div>
    <div class="spacer"></div>

    <div class="line"><span class="prompt">~ $</span> <span class="cursor"></span></div>

  </div>
</div>

</body>
</html>
